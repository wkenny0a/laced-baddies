<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">Laced Baddies Four Wig Hairstyles</title>
  <desc id="desc">A branded four-panel hairstyle guide showing middle part, side part, half-up glam, and soft curls.</desc>
  <defs>
    <linearGradient id="brandGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff007f"/>
      <stop offset="1" stop-color="#ffa62b"/>
    </linearGradient>
    <linearGradient id="creamGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8f0"/>
      <stop offset="1" stop-color="#ffd48d"/>
    </linearGradient>
    <filter id="panelShadow" x="-18%" y="-35%" width="136%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.58"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-35%" width="140%" height="170%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#120704" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ff007f" flood-opacity="0.35"/>
    </filter>
    <style>
      .brand { font-family: "Syne", "Arial Black", Arial, sans-serif; font-weight: 900; letter-spacing: 0.08em; fill: #fff8f0; }
      .headline { font-family: "Syne", "Arial Black", Arial, sans-serif; font-weight: 900; letter-spacing: 0.04em; fill: url(#creamGradient); }
      .panel-label { font-family: "Syne", "Arial Black", Arial, sans-serif; font-weight: 900; letter-spacing: 0.03em; fill: #fff8f0; }
    </style>
  </defs>

  <image href="laced-baddies-four-hairstyles-base.png" width="1254" height="1254" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1254" height="1254" fill="#120704" opacity="0.06"/>
  <rect x="0" y="0" width="1254" height="1254" fill="none" stroke="url(#brandGradient)" stroke-width="14"/>

  <g filter="url(#panelShadow)">
    <rect x="220" y="32" width="814" height="72" rx="25" fill="#220f0a" opacity="0.9" stroke="url(#brandGradient)" stroke-width="4"/>
    <text x="627" y="80" text-anchor="middle" class="headline" font-size="34">MANY EASY WAYS TO STYLE</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="68" y="520" width="492" height="76" rx="24" fill="#220f0a" opacity="0.9" stroke="url(#brandGradient)" stroke-width="4"/>
    <text x="314" y="570" text-anchor="middle" class="panel-label" font-size="34" filter="url(#textGlow)">MIDDLE PART</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="694" y="520" width="492" height="76" rx="24" fill="#220f0a" opacity="0.9" stroke="url(#brandGradient)" stroke-width="4"/>
    <text x="940" y="570" text-anchor="middle" class="panel-label" font-size="34" filter="url(#textGlow)">SIDE PART</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="68" y="1150" width="492" height="76" rx="24" fill="#220f0a" opacity="0.9" stroke="url(#brandGradient)" stroke-width="4"/>
    <text x="314" y="1200" text-anchor="middle" class="panel-label" font-size="32" filter="url(#textGlow)">HALF-UP GLAM</text>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="694" y="1150" width="492" height="76" rx="24" fill="#220f0a" opacity="0.9" stroke="url(#brandGradient)" stroke-width="4"/>
    <text x="940" y="1200" text-anchor="middle" class="panel-label" font-size="34" filter="url(#textGlow)">SOFT CURLS</text>
  </g>
</svg>
