<svg width="1254" height="1254" viewBox="0 0 1254 1254" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF007F"/>
      <stop offset="1" stop-color="#FFA62B"/>
    </linearGradient>
    <linearGradient id="mangoGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF007F"/>
      <stop offset=".56" stop-color="#FF6B4A"/>
      <stop offset="1" stop-color="#FFA62B"/>
    </linearGradient>
    <linearGradient id="premiumWash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFA62B" stop-opacity=".22"/>
      <stop offset=".52" stop-color="#FF007F" stop-opacity=".07"/>
      <stop offset="1" stop-color="#120704" stop-opacity=".2"/>
    </linearGradient>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#120704" stop-opacity=".34"/>
      <stop offset=".55" stop-color="#220F0A" stop-opacity=".12"/>
      <stop offset="1" stop-color="#120704" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="heroModelClip">
      <rect x="0" y="0" width="1254" height="864"/>
    </clipPath>
    <clipPath id="zoomClip">
      <circle cx="1025" cy="246" r="214"/>
    </clipPath>
    <pattern id="visibleMesh" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M11 0 22 6 22 18 11 22 0 18 0 6Z" fill="none" stroke="#FFF8F0" stroke-width="1.2" stroke-opacity=".28"/>
    </pattern>
    <pattern id="softMesh" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M9 0 18 5 18 13 9 18 0 13 0 5Z" fill="none" stroke="#FFF8F0" stroke-width=".75" stroke-opacity=".16"/>
    </pattern>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#120704" flood-opacity=".45"/>
    </filter>
    <filter id="tinyShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#120704" flood-opacity=".42"/>
    </filter>
    <marker id="arrowHead" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1 1 12 7 1 13Z" fill="#FF6B9D"/>
    </marker>
    <style>
      .brand-font { font-family: "Arial Black", Impact, Helvetica, Arial, sans-serif; letter-spacing: 0; }
      .body-font { font-family: Helvetica, Arial, sans-serif; letter-spacing: 0; }
      .cream { fill: #FFF8F0; }
      .muted { fill: #D1C5C0; }
      .fuchsia { fill: #FF007F; }
      .mango { fill: #FFA62B; }
      .panel { fill: #220F0A; fill-opacity: .91; }
      .glass { fill: #220F0A; fill-opacity: .84; stroke: rgba(255,248,240,.3); stroke-width: 1.5; }
    </style>
  </defs>

  <image href="wig-ultra-hd-lace-clean-base-v4.png" x="0" y="0" width="1254" height="1254" preserveAspectRatio="xMidYMid slice"/>
  <g clip-path="url(#heroModelClip)">
    <rect x="0" y="0" width="1254" height="864" fill="#B17A5C"/>
    <image href="main_model.png" x="-350" y="100" width="1800" height="1800" preserveAspectRatio="xMidYMid slice"/>
    <rect x="0" y="0" width="1254" height="864" fill="#120704" opacity=".08"/>
  </g>
  <g clip-path="url(#zoomClip)">
    <rect x="807" y="28" width="436" height="436" fill="#D9A07A"/>
    <image href="main_model.png" x="70" y="-40" width="1700" height="1700" preserveAspectRatio="xMidYMid slice"/>
    <rect x="807" y="28" width="436" height="436" fill="#FFF8F0" opacity=".06"/>
  </g>
  <rect x="0" y="0" width="1254" height="1254" fill="#120704" opacity=".08"/>
  <rect x="0" y="0" width="1254" height="690" fill="url(#topFade)"/>

  <g filter="url(#softShadow)">
    <rect x="30" y="26" width="760" height="154" rx="18" class="panel"/>
    <rect x="31.5" y="27.5" width="757" height="151" rx="16" fill="none" stroke="url(#brandGradient)" stroke-width="3"/>
    <text x="56" y="72" class="brand-font cream" font-size="29">LACED BADDIES</text>
    <text x="56" y="126" class="brand-font" font-size="44" fill="url(#mangoGlow)">OUR ULTRA-HD LACE TECH</text>
    <text x="58" y="162" class="body-font muted" font-size="25">Pre-plucked, pre-bleached, camera-ready melt.</text>
  </g>

  <g filter="url(#tinyShadow)">
    <rect x="36" y="198" width="470" height="56" rx="28" fill="url(#brandGradient)"/>
    <text x="271" y="235" text-anchor="middle" class="brand-font" font-size="22" fill="#120704">GLUELESS BEAUTY-TECH FINISH</text>
  </g>

  <g filter="url(#softShadow)">
    <path d="M541 337 C569 323 585 309 605 294" fill="none" stroke="#FF6B9D" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <circle cx="606" cy="294" r="8" fill="#FFF8F0" opacity=".94"/>
    <circle cx="606" cy="294" r="14" fill="none" stroke="url(#brandGradient)" stroke-width="3"/>
    <rect x="38" y="276" width="510" height="112" rx="18" class="glass"/>
    <rect x="39.5" y="277.5" width="507" height="109" rx="16" fill="none" stroke="url(#brandGradient)" stroke-width="2"/>
    <text x="62" y="318" class="brand-font cream" font-size="27">PRE-CUSTOMIZED HAIRLINE</text>
    <text x="62" y="352" class="body-font muted" font-size="22">Soft density transition that mimics</text>
    <text x="62" y="378" class="body-font muted" font-size="22">natural growth.</text>
  </g>

  <g>
    <circle cx="1025" cy="246" r="221" fill="none" stroke="#120704" stroke-width="7" opacity=".5"/>
    <circle cx="1025" cy="246" r="217" fill="none" stroke="url(#brandGradient)" stroke-width="4"/>
    <circle cx="1025" cy="246" r="224" fill="none" stroke="#D1C5C0" stroke-width="2" opacity=".8"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="796" y="459" width="430" height="94" rx="20" class="panel"/>
    <rect x="797.5" y="460.5" width="427" height="91" rx="18" fill="none" stroke="url(#brandGradient)" stroke-width="2"/>
    <text x="1011" y="494" text-anchor="middle" class="brand-font cream" font-size="25">PRE-PLUCKED GRADIENT</text>
    <text x="1011" y="526" text-anchor="middle" class="brand-font" font-size="24" fill="url(#mangoGlow)">HAIRLINE &amp; BLEACHED KNOTS</text>
  </g>

  <g>
    <rect x="5" y="864" width="407" height="376" rx="13" fill="none" stroke="#120704" stroke-width="8" opacity=".45"/>
    <rect x="428" y="864" width="400" height="376" rx="13" fill="none" stroke="#120704" stroke-width="8" opacity=".45"/>
    <rect x="842" y="864" width="406" height="376" rx="13" fill="none" stroke="#120704" stroke-width="8" opacity=".48"/>

    <rect x="8" y="867" width="401" height="286" rx="11" fill="url(#visibleMesh)" opacity=".34"/>
    <rect x="431" y="867" width="394" height="286" rx="11" fill="url(#softMesh)" opacity=".22"/>
    <rect x="845" y="867" width="400" height="286" rx="11" fill="url(#premiumWash)" opacity=".85"/>

    <rect x="5" y="864" width="407" height="376" rx="13" fill="none" stroke="#D1C5C0" stroke-width="2.2" opacity=".9"/>
    <rect x="428" y="864" width="400" height="376" rx="13" fill="none" stroke="#D1C5C0" stroke-width="2.2" opacity=".9"/>
    <rect x="842" y="864" width="406" height="376" rx="13" fill="none" stroke="url(#brandGradient)" stroke-width="4"/>
  </g>

  <g filter="url(#tinyShadow)">
    <rect x="7" y="1106" width="403" height="136" rx="0" fill="#120704"/>
    <rect x="7" y="1106" width="403" height="6" fill="#D1C5C0" opacity=".75"/>
    <text x="28" y="1138" class="brand-font muted" font-size="15">COMPETITOR LACE</text>
    <text x="28" y="1172" class="brand-font cream" font-size="30">Regular Lace</text>
    <text x="28" y="1203" class="body-font muted" font-size="18">Thick mesh, visible grid lines,</text>
    <text x="28" y="1226" class="body-font muted" font-size="18">requires heavy makeup to hide.</text>

    <rect x="430" y="1106" width="396" height="136" rx="0" fill="#120704"/>
    <rect x="430" y="1106" width="396" height="6" fill="#D1C5C0" opacity=".75"/>
    <text x="451" y="1138" class="brand-font muted" font-size="15">COMPETITOR LACE</text>
    <text x="451" y="1172" class="brand-font cream" font-size="31">HD Lace</text>
    <text x="451" y="1203" class="body-font muted" font-size="18">Thinner, but still shows a pattern</text>
    <text x="451" y="1226" class="body-font muted" font-size="18">in direct sunlight.</text>

    <rect x="844" y="1098" width="402" height="144" rx="0" fill="#220F0A"/>
    <rect x="844" y="1098" width="402" height="8" fill="url(#brandGradient)"/>
    <text x="865" y="1134" class="brand-font mango" font-size="15">LACED BADDIES STANDARD</text>
    <text x="865" y="1169" class="brand-font" font-size="27" fill="url(#mangoGlow)">Our Ultra-HD Lace&#8482;</text>
    <text x="865" y="1196" class="body-font cream" font-size="17">Micro-fine invisible weave.</text>
    <text x="865" y="1218" class="body-font cream" font-size="17">Zero grid pattern, zero</text>
    <text x="865" y="1240" class="body-font cream" font-size="17">melting spray required.</text>
  </g>
</svg>
