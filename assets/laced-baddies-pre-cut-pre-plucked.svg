<svg width="1254" height="1254" viewBox="0 0 1254 1254" xmlns="http://www.w3.org/2000/svg">
  <title>Laced Baddies pre-cut lace and pre-plucked hairline product graphic</title>
  <desc>A warm editorial Laced Baddies product graphic using the real wig photo, with callouts highlighting the pre-cut lace and pre-plucked hairline.</desc>
  <defs>
    <linearGradient id="bgWash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0ddd2"/>
      <stop offset=".42" stop-color="#d8b7a3"/>
      <stop offset="1" stop-color="#8a5c45"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="18%" cy="18%" r="55%">
      <stop offset="0" stop-color="#fff4ec" stop-opacity=".92"/>
      <stop offset=".52" stop-color="#f6ddd0" stop-opacity=".36"/>
      <stop offset="1" stop-color="#f6ddd0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="16%" r="48%">
      <stop offset="0" stop-color="#ffd7b3" stop-opacity=".45"/>
      <stop offset=".58" stop-color="#ffa062" stop-opacity=".15"/>
      <stop offset="1" stop-color="#ffa062" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF007F"/>
      <stop offset="1" stop-color="#FFA62B"/>
    </linearGradient>
    <linearGradient id="panelEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF007F"/>
      <stop offset=".55" stop-color="#ff7a54"/>
      <stop offset="1" stop-color="#FFA62B"/>
    </linearGradient>
    <filter id="blurLarge" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="54"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#120704" flood-opacity=".25"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#120704" flood-opacity=".18"/>
    </filter>
    <clipPath id="photoClip">
      <rect x="92" y="302" width="832" height="832" rx="34"/>
    </clipPath>
    <clipPath id="zoomClip">
      <circle cx="1003" cy="272" r="164"/>
    </clipPath>
    <marker id="arrowHead" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1 1 12 7 1 13Z" fill="#ff4d8f"/>
    </marker>
    <style>
      .headline { font-family: "Arial Black", Impact, Helvetica, Arial, sans-serif; letter-spacing: 0; }
      .body { font-family: Helvetica, Arial, sans-serif; letter-spacing: 0; }
      .cream { fill: #FFF8F0; }
      .muted { fill: #D1C5C0; }
      .panel { fill: #220F0A; fill-opacity: .9; }
      .glass { fill: #220F0A; fill-opacity: .78; stroke: rgba(255,248,240,.25); stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1254" height="1254" fill="url(#bgWash)"/>
  <rect width="1254" height="1254" fill="url(#glowLeft)"/>
  <rect width="1254" height="1254" fill="url(#glowRight)"/>
  <ellipse cx="258" cy="964" rx="236" ry="138" fill="#b07a5a" opacity=".24" filter="url(#blurLarge)"/>
  <ellipse cx="1054" cy="1016" rx="248" ry="164" fill="#fff1e5" opacity=".16" filter="url(#blurLarge)"/>

  <g filter="url(#softShadow)">
    <rect x="48" y="38" width="614" height="166" rx="22" class="panel"/>
    <rect x="49.5" y="39.5" width="611" height="163" rx="20" fill="none" stroke="url(#panelEdge)" stroke-width="3"/>
    <text x="76" y="84" class="headline cream" font-size="31">LACED BADDIES</text>
    <text x="76" y="138" class="headline" font-size="54" fill="url(#brandGradient)">PRE-CUT LACE</text>
    <text x="78" y="182" class="body muted" font-size="29">Pre-plucked hairline, ready to wear.</text>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="92" y="302" width="832" height="832" rx="34" fill="#f3e3d8" opacity=".74"/>
    <rect x="92" y="302" width="832" height="832" rx="34" fill="none" stroke="#fff5ef" stroke-opacity=".82" stroke-width="2"/>
  </g>

  <g clip-path="url(#photoClip)">
    <image href="laced-baddies-pre-cut-pre-plucked-base.jpeg" x="92" y="302" width="832" height="832" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g filter="url(#softShadow)">
    <circle cx="1003" cy="272" r="170" fill="#220F0A" fill-opacity=".14"/>
    <circle cx="1003" cy="272" r="164" fill="#f5ddd0"/>
    <g clip-path="url(#zoomClip)">
      <image href="laced-baddies-pre-cut-pre-plucked-base.jpeg" x="666" y="72" width="560" height="560" preserveAspectRatio="xMidYMid slice"/>
    </g>
    <circle cx="1003" cy="272" r="164" fill="none" stroke="url(#panelEdge)" stroke-width="5"/>
    <circle cx="1003" cy="272" r="170" fill="none" stroke="#fff2ea" stroke-opacity=".78" stroke-width="2"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M772 430 C816 414 850 392 888 354" fill="none" stroke="#ff5d96" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <circle cx="888" cy="354" r="9" fill="#FFF8F0"/>
    <circle cx="888" cy="354" r="15" fill="none" stroke="url(#brandGradient)" stroke-width="3"/>
    <rect x="770" y="454" width="432" height="88" rx="22" class="glass"/>
    <rect x="771.5" y="455.5" width="429" height="85" rx="20" fill="none" stroke="url(#panelEdge)" stroke-width="2"/>
    <text x="986" y="494" text-anchor="middle" class="headline cream" font-size="27">PRE-PLUCKED HAIRLINE</text>
    <text x="986" y="523" text-anchor="middle" class="body muted" font-size="20">Soft density, no extra customizing.</text>
  </g>

  <g filter="url(#softShadow)">
    <path d="M434 994 C492 936 556 864 640 804" fill="none" stroke="#ff5d96" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <circle cx="640" cy="804" r="9" fill="#FFF8F0"/>
    <circle cx="640" cy="804" r="15" fill="none" stroke="url(#brandGradient)" stroke-width="3"/>
    <rect x="56" y="1002" width="448" height="116" rx="26" class="glass"/>
    <rect x="57.5" y="1003.5" width="445" height="113" rx="24" fill="none" stroke="url(#panelEdge)" stroke-width="2"/>
    <text x="280" y="1050" text-anchor="middle" class="headline cream" font-size="31">PRE-CUT LACE</text>
    <text x="280" y="1083" text-anchor="middle" class="body muted" font-size="22">Scalloped edge, ready to wear.</text>
  </g>
</svg>
